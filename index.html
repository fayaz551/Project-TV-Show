<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Said Fayaz Sadat (Fayaz551)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="root">
      <main>
        <aside>
          <select name="sidebar" id="sidebar"></select>
        </aside>
        <form role="search" onsubmit="return false;">
          <input
            id="search-input"
            type="search"
            placeholder="Type to search..."
          />
          <p id="number-of-movies"></p>
        </form>
        
        <section id="episodes-section"></section>
        
        <template id="movie-card">
          <section class="episode-card">
            <h3></h3>
            <img src="" alt="" />
            <p></p>
            <a href="" target="_blank"></a>
          </section>
        </template>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
